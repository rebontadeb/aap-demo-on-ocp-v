---
- name: Backup OpenShift Virtualization VM (pre-patch snapshot)
  hosts: namespace_vm_workloads
  connection: local   # talks to Cluster B's K8s API, not to the VM itself
  gather_facts: false

  vars:
    # The redhat.openshift_virtualization inventory plugin prefixes the
    # namespace to the hostname (vm-workloads-rhel9-app-01). Strip it to
    # get the actual VirtualMachine resource name for k8s API calls.
    vm_name: "{{ inventory_hostname | regex_replace('^' + ocpvirt_namespace + '-', '') }}"
    snapshot_name: "pre-patch-{{ tower_job_id | default('manual') }}-{{ vm_name }}"

  tasks:
    - name: Create VirtualMachineSnapshot for {{ vm_name }}
      kubernetes.core.k8s:
        state: present
        definition:
          apiVersion: snapshot.kubevirt.io/v1beta1
          kind: VirtualMachineSnapshot
          metadata:
            name: "{{ snapshot_name }}"
            namespace: "{{ ocpvirt_namespace }}"
            labels:
              vm-name: "{{ vm_name }}"
          spec:
            source:
              apiGroup: kubevirt.io
              kind: VirtualMachine
              name: "{{ vm_name }}"

    - name: Wait for the snapshot to be ready
      kubernetes.core.k8s_info:
        api_version: snapshot.kubevirt.io/v1beta1
        kind: VirtualMachineSnapshot
        name: "{{ snapshot_name }}"
        namespace: "{{ ocpvirt_namespace }}"
      register: snap_status
      until: snap_status.resources[0].status.readyToUse | default(false)
      retries: 30
      delay: 10

    - name: Record snapshot name for the workflow
      ansible.builtin.set_stats:
        data:
          snapshot_name: "{{ snapshot_name }}"
        per_host: true

    - name: Show the snapshot name (useful for ad-hoc runs)
      ansible.builtin.debug:
        msg: "Created snapshot {{ snapshot_name }} for {{ vm_name }}"
