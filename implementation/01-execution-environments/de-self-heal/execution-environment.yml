---
version: 3

images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-25/de-minimal-rhel9:latest

dependencies:
  galaxy: requirements.yml

additional_build_steps:
  prepend_builder:
    - RUN ln -sf /usr/bin/microdnf /usr/bin/dnf
    # systemd-python (pulled in by ansible.eda) has no manylinux wheel and
    # must be compiled from source. Install its build-time deps from UBI repos.
    - RUN microdnf install -y gcc python3.12-devel pkgconf-pkg-config systemd-devel
    - RUN sed -i 's#bindep -l newline | sort#bindep -l newline | grep -v openshift-clients | sort#' /output/scripts/assemble
    - RUN sed -i 's#compile_packages=.*#compile_packages=$(bindep -b compile 2>/dev/null | grep -v openshift-clients || true)#' /output/scripts/assemble
  prepend_final:
    - RUN ln -sf /usr/bin/microdnf /usr/bin/dnf
