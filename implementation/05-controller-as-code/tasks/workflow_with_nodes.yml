---
# Included once per item in `workflows` (controller_objects.yml), with the
# current item available as `workflow`.

- name: "Create workflow job template: {{ workflow.name }}"
  ansible.controller.workflow_job_template:
    name: "{{ workflow.name }}"
    organization: "{{ org_name }}"
    ask_limit_on_launch: true
    state: present

- name: "Add workflow nodes for: {{ workflow.name }}"
  ansible.controller.workflow_job_template_node:
    workflow_job_template: "{{ workflow.name }}"
    organization: "{{ org_name }}"
    identifier: "{{ item.identifier }}"
    unified_job_template: "{{ item.unified_job_template }}"
    success_nodes: "{{ item.success_nodes | default([]) }}"
    failure_nodes: "{{ item.failure_nodes | default([]) }}"
    state: present
  loop: "{{ workflow.nodes }}"
  loop_control:
    label: "{{ item.identifier }}"
